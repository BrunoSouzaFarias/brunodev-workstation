name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Publicar release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      # ponytail: SHA pinado para supply chain safety; atualizar hash ao bumpar versão
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Criar tarball do release
        run: |
          git archive --format=tar.gz --prefix="brunodev-workstation-${GITHUB_REF_NAME}/" \
            -o "brunodev-workstation-${GITHUB_REF_NAME}.tar.gz" HEAD

      - name: Gerar changelog desde a tag anterior
        id: changelog
        run: |
          TAG_ANTERIOR="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          {
            echo "trecho<<FIM_CHANGELOG"
            if [[ -n "$TAG_ANTERIOR" ]]; then
              git log --pretty='- %s (%h)' "${TAG_ANTERIOR}..${GITHUB_REF_NAME}"
            else
              git log --pretty='- %s (%h)' "${GITHUB_REF_NAME}"
            fi
            echo "FIM_CHANGELOG"
          } >>"$GITHUB_OUTPUT"

      - name: Criar release no GitHub
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: brunodev-workstation-${{ github.ref_name }}.tar.gz
          body: |
            ## Mudanças

            ${{ steps.changelog.outputs.trecho }}

            ## Instalação

            ```bash
            bash <(curl -fsSL https://raw.githubusercontent.com/BrunoSouzaFarias/brunodev-workstation/${{ github.ref_name }}/install.sh)
            ```
