# ============================================================================
# BrunoDev Workstation — endurecimento do servidor SSH
# Drop-in gerenciado; alterações manuais serão preservadas em backup.
# ============================================================================

# Sem login direto de root
PermitRootLogin no

# Limita tentativas e sessões por conexão
MaxAuthTries 4
MaxSessions 6

# Derruba sessões mortas (5 min sem resposta, 2 tentativas)
ClientAliveInterval 300
ClientAliveCountMax 2

# Recursos raramente necessários em workstation
X11Forwarding no
AllowAgentForwarding yes
AllowTcpForwarding yes

# Reduz janelas de ataque no handshake
LoginGraceTime 30
MaxStartups 10:30:60
