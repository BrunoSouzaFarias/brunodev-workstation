# ============================================================================
# BrunoDev Workstation — prompt Starship
# Documentação: https://starship.rs/config/
# ============================================================================

add_newline = true
command_timeout = 1000

format = """
$directory$git_branch$git_status$nodejs$python$java$docker_context
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold magenta"

[git_status]
style = "yellow"

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"

[python]
symbol = " "
format = "[$symbol($version )]($style)"

[java]
symbol = " "
format = "[$symbol($version )]($style)"

[docker_context]
symbol = " "
format = "[$symbol$context]($style) "
only_with_files = true
