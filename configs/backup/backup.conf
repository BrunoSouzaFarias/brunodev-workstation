# shellcheck shell=bash disable=SC2034  # variáveis consumidas pelo brunodev-backup
# ============================================================================
# BrunoDev Workstation — configuração do backup pessoal
# Sintaxe bash: este arquivo é carregado pelo brunodev-backup.
# ============================================================================

# Diretórios incluídos no backup
BACKUP_DIRS=("$HOME/Documentos" "$HOME/.config" "$HOME/.ssh")

# Destino dos arquivos .tar.gz
BACKUP_DESTINO="$HOME/Backups"

# Quantos backups manter (os mais antigos são removidos)
BACKUP_MANTER=5
